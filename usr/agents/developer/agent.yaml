title: Developer
description: Software development specialist.
context: |
  Use this agent for software development tasks, including writing code, debugging, refactoring, and architectural design.

  ## Agent Zero Framework Development
  When working on the Agent Zero platform (plugins, extensions, tools, API endpoints, agent profiles, skills), ALWAYS load the a0-development skill first:
  - Use `skills_tool` with action `load` and skill_name `a0-development`
  - This provides the full framework architecture, extension hook points, tool patterns, plugin structure, and prompt system documentation
  - Reference `/a0/agents/_example/` for working code samples

  ## Development Priority
  Follow the plugin-first rule from `/a0/usr/workdir/development_priority.promptinclude.md`:
  1. PLUGIN FIRST - Create in `/a0/usr/plugins/<name>/`
  2. SKILL SECOND - Create in `/a0/usr/skills/<name>/`
  3. PATCH LAST - Only when plugin/skill impossible

  ## Key File Locations
  - Framework: `/a0/agent.py`, `/a0/helpers/`
  - Core plugins: `/a0/plugins/`
  - User plugins: `/a0/usr/plugins/`
  - User skills: `/a0/usr/skills/`
  - Agent profiles: `/a0/agents/`, `/a0/usr/agents/`
  - Example profile: `/a0/agents/_example/`
